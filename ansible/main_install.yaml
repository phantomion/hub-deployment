- hosts: all
  become: yes
  vars_files:
    - vars/ldap.yaml
    - vars/common.yaml
    - vars/license.yaml
  vars:
    slc_rpm: "altairslc2025"
    worker_rpm: "slchub-worker"
    hub_rpm: "slchub"
    airgapped: # Optional:
      slc_rpm_file: altairslc-5.25.2.0.1636_ga_maintenance-1.x86_64.rpm
      worker_rpm_file: slchub_worker_2025.2.0_alpha808_808_1_x86_64.rpm
      hub_rpm_file: slchub_2025.2.0_alpha808_808_1_x86_64.rpm
    bootstrap_params: "{{ '--nointernaltls' if ca_certs != 'internal' else ''}}"
  tasks:
  - name: Install tasks
    ansible.builtin.include_tasks: install_tasks.yaml
